<div id="faPlayground" class="container" fxLayout="row" fxLayoutAlign="center none">
    <div fxFlex="95%">
        <mat-card>
            <mat-card-content>
                <h2>Post</h2>
                <form [formGroup]="form">
                    <div fxLayout="row">
                        <mat-form-field class="full-width">
                        <textarea
                            matInput
                            placeholder="Test or prepare something neat!"
                            formControlName="postContent"
                            (ngModelChange)="updatePostContent()"
                        ></textarea>
                        </mat-form-field>
                    </div>
                </form>
            </mat-card-content>
        </mat-card>
        <mat-card style="margin-top: 30px;">
            <mat-card-content>
                <h2>Preview</h2>
                <div fxLayout="row">
                    <div id="playgroundOutput">
                        <div [innerHTML]="PlaygroundOutput"></div>
                    </div>
                </div>
            </mat-card-content>
        </mat-card>
    </div>
</div>
