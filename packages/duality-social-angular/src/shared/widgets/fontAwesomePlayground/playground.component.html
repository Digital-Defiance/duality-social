<div id="faPlayground" class="container" fxLayout="row" fxLayoutAlign="center none">
    <div fxFlex="95%">
        <mat-card>
            <mat-card-content>
                <h2>Icon Playground</h2>
                <form [formGroup]="form">
                    <div fxLayout="row">
                        <mat-form-field class="full-width">
                        <textarea
                            matInput
                            placeholder="Test or prepare something neat!"
                            formControlName="postContent"
                            (ngModelChange)="updatePostContent()"
                        ></textarea>
                        </mat-form-field>
                    </div>
                </form>
            </mat-card-content>
        </mat-card>
        <app-post-preview [PreviewInput]="postContent"></app-post-preview>
    </div>
</div>
